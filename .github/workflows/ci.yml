name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dotnet-version: 8.0.x
            framework: net8.0
          - dotnet-version: 9.0.x
            framework: net9.0
          - dotnet-version: 10.0.x
            framework: net10.0

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Restore
        run: dotnet restore tests/Unilyze.Tests/Unilyze.Tests.csproj

      - name: Test
        run: dotnet test tests/Unilyze.Tests/Unilyze.Tests.csproj -f ${{ matrix.framework }} --no-restore -v minimal

  pack-smoke:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore src/Unilyze/Unilyze.csproj

      - name: Read package version
        id: package
        shell: bash
        run: echo "version=$(grep -oPm1 '(?<=<Version>)[^<]+' src/Unilyze/Unilyze.csproj)" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: dotnet pack src/Unilyze/Unilyze.csproj -c Release --no-restore -o ./artifacts/nupkg

      - name: Release smoke
        run: bash ./scripts/release-smoke.sh --package-source ./artifacts/nupkg --version "${{ steps.package.outputs.version }}"
